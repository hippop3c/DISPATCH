<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>智慧調度 — 任務派發</title>
<style>
:root{
  --yb:#f4ca00; --ink:#1c1a12; --paper:#fbf8ef; --card:#ffffff;
  --line:#d9d2b8; --muted:#7a745e;
  --in:#e03a2c; --in-bg:#fdeeec;   /* 補車 */
  --out:#e88600; --out-bg:#fff3e2; /* 拉車 */
  --ok:#1d9a6c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  background:var(--paper);color:var(--ink);min-height:100vh;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 34px,rgba(28,26,18,.035) 34px,rgba(28,26,18,.035) 35px)}
.wrap{max-width:520px;margin:0 auto;padding:0 14px 90px}

/* ── 頁首:派車單樣式 ── */
header{background:var(--yb);margin:0 -14px 16px;padding:14px 18px 12px;
  border-bottom:3px solid var(--ink);display:flex;align-items:baseline;justify-content:space-between}
header h1{font-size:1.15rem;font-weight:900;letter-spacing:.14em}
header .clock{font-variant-numeric:tabular-nums;font-weight:700;font-size:.95rem}

/* ── 表單 ── */
.form-card{background:var(--card);border:1.5px solid var(--ink);border-radius:10px;
  box-shadow:4px 4px 0 rgba(28,26,18,.15);padding:18px 16px;margin-top:18px}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:.8rem;font-weight:800;letter-spacing:.12em;margin-bottom:6px;color:var(--ink)}
.fld label .req{color:var(--in);margin-left:2px}
.fld input,.fld select{width:100%;font-size:1.05rem;padding:12px;border:1.5px solid var(--line);
  border-radius:8px;background:#fff;color:var(--ink);font-family:inherit}
.fld input:focus,.fld select:focus{outline:2px solid var(--yb);border-color:var(--ink)}
.loc-row{display:flex;gap:8px}
.loc-row input{flex:1}
.gps-btn{flex:none;padding:0 14px;border:1.5px solid var(--ink);border-radius:8px;
  background:var(--yb);font-weight:800;font-size:.95rem;cursor:pointer;font-family:inherit}
.gps-btn:active{transform:translate(1px,1px)}
.loc-hint{font-size:.78rem;color:var(--muted);margin-top:6px;min-height:1em}
.loc-hint b{color:var(--ink)}
.loc-hint .apply{color:#0b62c4;text-decoration:underline;cursor:pointer;margin-left:6px}

.go-btn{width:100%;margin-top:6px;padding:15px;font-size:1.15rem;font-weight:900;letter-spacing:.25em;
  background:var(--ink);color:var(--yb);border:none;border-radius:10px;cursor:pointer;font-family:inherit;
  box-shadow:4px 4px 0 rgba(28,26,18,.25)}
.go-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(28,26,18,.25)}
.err{color:var(--in);font-size:.85rem;margin-top:10px;font-weight:700;min-height:1em}

/* ── 任務畫面 ── */
/* 同區動態(置頂) */
.feed{background:var(--card);border:1.5px solid var(--ink);border-radius:12px;
  box-shadow:4px 4px 0 rgba(28,26,18,.12);margin-top:14px;overflow:hidden}
.feed-h{display:flex;align-items:center;gap:8px;background:var(--ink);color:var(--yb);
  padding:7px 12px;font-size:.8rem;font-weight:800;letter-spacing:.08em}
.feed-h .note{color:#ffd;font-weight:700;font-size:.7rem}
.feed-h a{margin-left:auto;color:var(--yb);text-decoration:underline;cursor:pointer;font-size:.74rem;flex:none}
.feed ul{list-style:none;max-height:190px;overflow-y:auto}
.feed li{padding:8px 12px;border-bottom:1px dashed var(--line);font-size:.8rem}
.feed li:last-child{border-bottom:none}
.feed .frow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.feed .froute{color:var(--muted);font-size:.72rem;margin-top:2px}
.feed .ftime{margin-left:auto;color:var(--muted);font-size:.7rem;font-variant-numeric:tabular-nums}
.fst{flex:none;font-size:.66rem;font-weight:900;border-radius:5px;padding:1px 6px;color:#fff}
.fst.run{background:#0b62c4}
.fst.done{background:var(--ok)}
.fst.todo{background:var(--gray,#6c7a8e)}
.fme{background:var(--yb);border:1px solid var(--ink);border-radius:4px;
  font-size:.6rem;font-weight:900;padding:0 4px;margin-left:4px;vertical-align:1px}
.fkind{font-weight:900}
.fkind.in{color:var(--in)} .fkind.out{color:var(--out)}
.fkind.bind{color:#7a3fbf} .fkind.unbind{color:#1d7a9a}
.feed .fempty{padding:12px;text-align:center;color:var(--muted);font-size:.78rem;font-weight:700}
.rpt{padding:10px 12px;border-bottom:1.5px dashed var(--line);background:#faf6e8}
.rpt .row{display:flex;gap:6px;margin-bottom:8px}
.rpt input,.rpt select{padding:9px;border:1.2px solid var(--line);border-radius:8px;font-size:.9rem;font-family:inherit;background:#fff}
.rpt .r-st{flex:1;min-width:0}
.rpt .r-q{width:70px}
.rpt .r-send{width:100%;padding:10px;border:1.5px solid var(--ink);border-radius:8px;background:var(--yb);font-weight:900;cursor:pointer;font-family:inherit}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 12px}
.chip{background:var(--card);border:1.2px solid var(--ink);border-radius:999px;
  font-size:.74rem;padding:4px 10px;font-weight:700}
.chip span{color:var(--muted);font-weight:600;margin-right:3px}

.stepline{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted);
  margin:4px 2px 10px;font-weight:700}
.stepline b{color:var(--ink)}

.task-card{background:var(--card);border:1.5px solid var(--ink);border-radius:12px;
  box-shadow:5px 5px 0 rgba(28,26,18,.15);overflow:hidden;margin-bottom:14px}
.task-head{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1.5px dashed var(--line)}
.task-head.in{background:var(--in-bg)}
.task-head.out{background:var(--out-bg)}
.badge{flex:none;font-size:1rem;font-weight:900;color:#fff;border-radius:8px;padding:6px 12px;letter-spacing:.2em}
.badge.in{background:var(--in)} .badge.out{background:var(--out)}
.task-title{flex:1}
.task-title .tgt{font-size:1.2rem;font-weight:900;line-height:1.25}
.task-title .sub{font-size:.78rem;color:var(--muted);font-weight:700;margin-top:2px}
.task-load{flex:none;text-align:center}
.task-load .n{font-size:1.7rem;font-weight:900;line-height:1}
.task-load .u{font-size:.7rem;color:var(--muted);font-weight:700}

.link-bar{display:flex;align-items:center;gap:8px;background:#f1ecdc;
  padding:8px 14px;font-size:.8rem;font-weight:700;border-bottom:1.5px dashed var(--line)}
.link-bar .lk-ic{font-size:1rem}
.link-bar .lk-time{margin-left:auto;font-variant-numeric:tabular-nums}

/* 站點流程 */
.flow{padding:6px 14px 12px}
.stop{display:flex;gap:12px}
.stop .rail{flex:none;width:48px;display:flex;flex-direction:column;align-items:center}
.stop .dot{min-width:48px;height:26px;border-radius:13px;border:2px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;background:#fff;flex:none;padding:0 4px}
.stop.pk .dot{background:var(--yb)}
.stop.dp .dot{background:var(--ink);color:var(--yb)}
.stop .vline{flex:1;width:2px;background:var(--line);min-height:26px}
.stop .body{flex:1;padding:2px 0 14px}
.stop .st-name{font-size:1.02rem;font-weight:800}
.stop .st-act{font-size:.8rem;font-weight:800;margin-top:2px}
.stop.pk .st-act{color:var(--out)} .stop.dp .st-act{color:var(--in)}
.stop .st-meta{font-size:.74rem;color:var(--muted);margin-top:2px}
.stop .seg{font-size:.72rem;color:var(--muted);margin:0 0 10px;padding:3px 8px;
  background:#f5f1e3;border-radius:6px;display:inline-block;font-weight:700}

.est-line{padding:0 14px 12px;font-size:1rem;font-weight:800}
.est-line b{font-size:1.35rem}
.cost-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 14px 12px}
.cg{border:1.2px solid var(--line);border-radius:8px;padding:6px 4px;text-align:center;background:#fff}
.cg .v{font-size:.98rem;font-weight:900;font-variant-numeric:tabular-nums}
.cg .l{font-size:.62rem;color:var(--muted);font-weight:700}

.pg-wrap{padding:0 14px 14px}
.pg-track{height:10px;border:1.2px solid var(--ink);border-radius:99px;overflow:hidden;background:#fff}
.pg-fill{height:100%;background:var(--yb);transition:width .4s}
.pg-fill.warn{background:var(--out)} .pg-fill.over{background:var(--in)}
.pg-txt{font-size:.72rem;color:var(--muted);font-weight:700;margin-top:4px;text-align:right}

.act-row{display:flex;gap:10px;margin-top:4px}
.btn{flex:1;padding:14px;font-size:1.02rem;font-weight:900;border-radius:10px;cursor:pointer;
  font-family:inherit;border:1.5px solid var(--ink);letter-spacing:.1em}
.btn.done{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn.ghost{background:#fff}
.btn:active{transform:translate(1px,1px)}
.mini{font-size:.78rem;color:var(--muted);text-align:center;margin-top:12px;font-weight:700}
.mini a{color:#0b62c4;cursor:pointer;text-decoration:underline}

/* 完工 */
.fin{background:var(--card);border:1.5px solid var(--ink);border-radius:12px;text-align:center;
  padding:30px 16px;box-shadow:5px 5px 0 rgba(28,26,18,.15)}
.fin .big{font-size:2.4rem;font-weight:900}
.fin .lbl{font-size:.85rem;color:var(--muted);font-weight:700;margin-bottom:14px}
.fin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0 20px}
.empty{background:var(--card);border:1.5px dashed var(--ink);border-radius:12px;text-align:center;
  padding:34px 16px;font-weight:700;color:var(--muted)}
.hide{display:none}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>智慧調度</h1><div class="clock" id="clock"></div></header>

  <!-- ══ 輸入畫面 ══ -->
  <section id="scrForm">
    <div class="form-card">
      <div class="fld">
        <label>員工編號<span class="req">＊</span></label>
        <input id="empId" inputmode="text" autocomplete="off" placeholder="例:A12345">
      </div>
      <div class="fld">
        <label>責任區<span class="req">＊</span></label>
        <select id="zoneSel"></select>
      </div>
      <div class="fld">
        <label>車號<span class="req">＊</span></label>
        <input id="truckId" autocomplete="off" placeholder="例:KEA-1234">
      </div>
      <div class="fld">
        <label>目前地點<span class="req">＊</span></label>
        <div class="loc-row">
          <input id="locInput" list="stationList" autocomplete="off" placeholder="輸入場站名稱,或按定位">
          <button class="gps-btn" id="gpsBtn" type="button">📍 定位</button>
        </div>
        <datalist id="stationList"></datalist>
        <div class="loc-hint" id="locHint"></div>
      </div>
      <button class="go-btn" id="goBtn" type="button">派 發 任 務</button>
      <div class="err" id="formErr"></div>
    </div>
  </section>

  <!-- ══ 任務畫面 ══ -->
  <section id="scrTask" class="hide">
    <div id="feedBox"></div>
    <div class="chiprow" id="chips"></div>
    <div class="stepline" id="stepline"></div>
    <div id="taskBox"></div>
    <div class="act-row" id="actRow">
      <button class="btn ghost" id="backBtn" type="button">↩ 返回</button>
      <button class="btn done" id="doneBtn" type="button">✔ 完成本任務</button>
    </div>
    <div class="mini" id="miniInfo"></div>
  </section>
</div>

/* ═══ OR 參數(同原版) ═══ */
const SETUP=5, MIN_Q=3, ROAD_K=1.4;
const TOR=1.0, MAXQ=14, BUDGET=60, DRIVE_BUF=2;  // 貨車容量14,班次預算60分,每段行車固定+2分(起步/停車緩衝)
/* 依裝置當下時段調整行車車速(市區貨車實際速度) */
function spdAt(h){
  if((h>=7&&h<=9)||(h>=17&&h<=19))return 15;  // 尖峰
  if(h>=20)return 25;                          // 夜間
  return 20;                                   // 離峰
}
const $=id=>document.getElementById(id);

/* ═══ geo(同原版) ═══ */
function hav(a,b){if(!a||!b||a.lat==null||b.lat==null)return 0;const R=6371,r=Math.PI/180,dL=(b.lat-a.lat)*r,dN=(b.lng-a.lng)*r,x=Math.sin(dL/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function rKm(a,b){return hav(a,b)*ROAD_K}
function drv(a,b,s,t){const km=rKm(a,b);if(km<=0.001)return 0;return km*t/s*60+DRIVE_BUF}

/* ═══ 庫存:6時起累積 deltas(同原版 stockAt) ═══ */
function stockAt(r,t){let s=0;for(let h=6;h<=t;h++)s+=Number(r.deltas[h-6]||0);return s}

/* ═══ 趟內耗時:每站整備5分+裝卸每輛1分+站間行車(同原版) ═══ */
function tTime(stops,spd,tor){
  let su=0,wk=0,tv=0;const sd=[],sg=[];
  for(let i=0;i<stops.length;i++){
    su+=SETUP;wk+=stops[i].qty;
    sd.push({station:stops[i].station,qty:stops[i].qty,action:stops[i].action,
             setup:SETUP,work:stops[i].qty,stTime:SETUP+stops[i].qty});
    if(i<stops.length-1){
      const d=rKm(stops[i].rec,stops[i+1].rec);
      const t2=drv(stops[i].rec,stops[i+1].rec,spd,tor);
      tv+=t2;sg.push({dist:d,time:t2});
    }
  }
  return{su,tv,wk,total:su+tv+wk,sd,sg};
}

/* ═══ OR ENGINE:Beam Search,含銜接行車(同原版 solve,起點改為人員目前位置) ═══ */
function solve(area,t,maxQ,spd,tor,BDG,startRec,adj){
  adj=adj||{};
  const recs=DATA.filter(r=>r.area===area);
  const recMap={},initSup={},initDem={};
  const stkOf=r=>stockAt(r,t)+(adj[r.station]||0);  // 疊加本班已完成的搬移
  for(const r of recs){
    recMap[r.station]=r;
    const stk=stkOf(r);
    if(stk>0)initSup[r.station]=stk;
    if(stk<0)initDem[r.station]=Math.abs(stk);
  }

  function genIn(tgtSt,sup,dem,timeLeft,minQ){
    const mq=minQ||MIN_Q;
    const need=dem[tgtSt]||0;
    if(need<mq)return[];
    const tgtR=recMap[tgtSt];
    const srcs=Object.entries(sup).filter(([st,v])=>v>0&&st!==tgtSt)
      .map(([st,v])=>({st,rec:recMap[st],av:v,d:rKm(recMap[st],tgtR)}))
      .sort((a,b)=>a.d-b.d).slice(0,15);
    if(!srcs.length)return[];
    const res=[];
    for(let n=1;n<=Math.min(3,srcs.length);n++){
      const combos=n===1?srcs.map(s=>[s]):n===2?c2(srcs.slice(0,10)):c3(srcs.slice(0,7));
      for(const combo of combos){
        let cap=0;for(const s of combo)cap+=s.av;
        const ld=Math.min(maxQ,cap,need);
        if(ld<mq)continue;
        let rm=ld;const picks=[];
        for(const s of combo){const tk=Math.min(s.av,rm);if(tk>0){picks.push({station:s.st,rec:s.rec,qty:tk,action:'pickup'});rm-=tk}if(rm<=0)break}
        const act=ld-rm;if(act<mq)continue;
        const stops=[...picks,{station:tgtSt,rec:tgtR,qty:act,action:'drop'}];
        const tt=tTime(stops,spd,tor);
        if(tt.total>timeLeft)continue;
        res.push({type:'in',target:tgtSt,stops,load:act,time:tt.total,tt,
                  startRec:picks[0].rec,endRec:tgtR});
      }
    }
    return res;
  }

  function genOut(srcSt,sup,dem,timeLeft,minQ){
    const mq=minQ||MIN_Q;
    const av=sup[srcSt]||0;if(av<mq)return[];
    const srcR=recMap[srcSt];
    const dsts=Object.entries(dem).filter(([st,v])=>v>=1&&st!==srcSt)
      .map(([st,v])=>({st,rec:recMap[st],need:v,d:rKm(srcR,recMap[st])}))
      .sort((a,b)=>a.d-b.d).slice(0,15);
    if(!dsts.length)return[];
    const res=[];
    for(let n=1;n<=Math.min(3,dsts.length);n++){
      const combos=n===1?dsts.map(s=>[s]):n===2?c2(dsts.slice(0,10)):c3(dsts.slice(0,7));
      for(const combo of combos){
        let cap=0;for(const d of combo)cap+=d.need;
        const ld=Math.min(maxQ,av,cap);if(ld<mq)continue;
        let rm=ld;const drops=[];
        for(const d of combo){const gv=Math.min(d.need,rm);if(gv>0){drops.push({station:d.st,rec:d.rec,qty:gv,action:'drop'});rm-=gv}if(rm<=0)break}
        const act=ld-rm;if(act<mq)continue;
        const stops=[{station:srcSt,rec:srcR,qty:act,action:'pickup'},...drops];
        const tt=tTime(stops,spd,tor);
        if(tt.total>timeLeft)continue;
        const lastDrop=drops[drops.length-1];
        res.push({type:'out',target:srcSt,stops,load:act,time:tt.total,tt,
                  startRec:srcR,endRec:lastDrop.rec});
      }
    }
    return res;
  }

  function c2(a){const r=[];for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)r.push([a[i],a[j]]);return r}
  function c3(a){const r=[];for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)for(let k=j+1;k<a.length;k++)r.push([a[i],a[j],a[k]]);return r}

  const BEAM_WIDTH=8,BRANCH_N=6,MAX_DEPTH=20;

  function expandState(state){
    const{sup,dem,timeUsed,curEndRec}=state;
    const timeLeft=BDG-timeUsed;
    if(timeLeft<SETUP*2+2)return[];
    const dynMinQ=(timeLeft>=SETUP*2+MIN_Q*2)?MIN_Q:1;
    let allTrips=[];
    for(const[st,need]of Object.entries(dem)){
      if(need<dynMinQ)continue;
      allTrips.push(...genIn(st,sup,dem,timeLeft,dynMinQ));
    }
    for(const[st,av]of Object.entries(sup)){
      const stk=stkOf(recMap[st]);
      if(stk>recMap[st].capacity&&av>=dynMinQ)
        allTrips.push(...genOut(st,sup,dem,timeLeft,dynMinQ));
    }
    if(!allTrips.length)return[];
    for(const trip of allTrips){
      const lk=curEndRec?drv(curEndRec,trip.startRec,spd,tor):0;
      trip.linkTime=lk;trip.totalCost=lk+trip.time;
    }
    let feasible=allTrips.filter(x=>x.totalCost<=timeLeft);
    if(!feasible.length)return[];
    feasible.sort((a,b)=>(b.load/b.totalCost)-(a.load/a.totalCost));
    const byLoad=[...feasible].sort((a,b)=>b.load-a.load||a.totalCost-b.totalCost);
    const picks=[],seen=new Set();
    const sig=tr=>tr.type+'|'+tr.stops.map(s=>s.station+':'+s.qty).join(',');
    for(const tr of[byLoad[0],byLoad[1],...feasible]){
      if(!tr)continue;
      const k=sig(tr);
      if(seen.has(k))continue;
      seen.add(k);picks.push(tr);
      if(picks.length>=BRANCH_N)break;
    }
    return picks;
  }

  function applyTrip(state,trip){
    const newSup={...state.sup},newDem={...state.dem};
    for(const s of trip.stops){
      if(s.action==='pickup')newSup[s.station]=(newSup[s.station]||0)-s.qty;
      else newDem[s.station]=(newDem[s.station]||0)-s.qty;
    }
    return{sup:newSup,dem:newDem,
      schedule:[...state.schedule,{trip,linkTime:trip.linkTime,
        linkFrom:state.curEndRec?state.curEndRec.station:'(起點)',
        linkTo:trip.startRec.station}],
      timeUsed:state.timeUsed+trip.totalCost,
      curEndRec:trip.endRec,
      totalVeh:state.totalVeh+trip.load};
  }

  function stateSig(s){
    return s.schedule.map(x=>x.trip.type+':'+x.trip.target+':'+x.trip.load).join('>')+'|'+Math.round(s.timeUsed);
  }

  const init={sup:{...initSup},dem:{...initDem},schedule:[],timeUsed:0,
    curEndRec:startRec||null,totalVeh:0};
  let beam=[init],bestState=init;
  for(let depth=0;depth<MAX_DEPTH;depth++){
    const nextBeam=[],seen=new Set();
    let anyExpanded=false;
    for(const state of beam){
      const candidates=expandState(state);
      if(!candidates.length)continue;
      anyExpanded=true;
      for(const trip of candidates){
        const ns=applyTrip(state,trip);
        const k=stateSig(ns);
        if(seen.has(k))continue;
        seen.add(k);nextBeam.push(ns);
        if(ns.totalVeh>bestState.totalVeh||
          (ns.totalVeh===bestState.totalVeh&&ns.timeUsed<bestState.timeUsed))bestState=ns;
      }
    }
    if(!anyExpanded||!nextBeam.length)break;
    nextBeam.sort((a,b)=>b.totalVeh-a.totalVeh||a.timeUsed-b.timeUsed);
    beam=nextBeam.slice(0,BEAM_WIDTH);
  }
  return{schedule:bestState.schedule,totalVeh:bestState.totalVeh,
    totalTime:bestState.timeUsed,totalLink:bestState.schedule.reduce((s,x)=>s+x.linkTime,0),
    shortC:Object.keys(initDem).length,fullC:recs.filter(r=>stockAt(r,t)>r.capacity).length,
    stationN:recs.length};
}

/* ═══ App 狀態 ═══ */
const APP={pos:null,posLabel:'',emp:'',truck:'',zone:'',t:0,sol:null,idx:0,cum:0,
  acts:[],      // 同區共用活動紀錄(所有人的任務與綁/解車回報)
  myActs:[],    // 我這份班次的任務紀錄(對應 schedule 順序)
  adjSig:''};   // 上次求解時「其他人」的庫存簽章,偵測新動態

/* ═══ 同區共用紀錄層 ═══
   優先順序:window.storage(Claude 共用) → localStorage(同機多分頁) → 記憶體
   注意:localStorage 只能同一台裝置/瀏覽器互通;跨裝置即時同步需後端(見說明) */
/* ★★ 跨裝置同步設定 ★★
   部署好 Google Apps Script(見附的 Code.gs)後,把「網頁應用程式網址」貼到下面,
   結尾是 /exec。留空 = 單機模式(僅同一台裝置的分頁互通)。 */
const SYNC_URL='https://script.google.com/macros/s/AKfycbxGePld45IewK_JyHgucM-Rt2JNOOKeCMSjo8RF6c3NvvZmTNJeT5x0yvqaSGz7eZaj/exec';

const MEM={};
let BC=null;try{BC=new BroadcastChannel('yb-dispatch')}catch(e){}
const Store={
  mode:SYNC_URL?'gas':((typeof window!=='undefined'&&window.storage&&window.storage.get)?'claude':'local'),
  async load(zone){
    if(this.mode==='gas'){
      try{
        const r=await fetch(SYNC_URL+'?zone='+encodeURIComponent(zone)+'&t='+Date.now());
        const arr=await r.json();
        return Array.isArray(arr)?arr:[];
      }catch(e){return APP.acts||[]}   // 網路失敗沿用快取
    }
    const key='act:'+zone;
    if(this.mode==='claude'){
      try{const r=await window.storage.get(key,true);return r&&r.value?JSON.parse(r.value):[]}
      catch(e){return[]}
    }
    try{const v=localStorage.getItem(key);return v?JSON.parse(v):(MEM[key]||[])}
    catch(e){return MEM[key]||[]}
  },
  /* 單筆增改/刪除:GAS 模式逐筆送出(不整包覆蓋,避免多人互洗資料) */
  async upsert(zone,rec){
    if(this.mode==='gas'){
      try{await fetch(SYNC_URL,{method:'POST',body:JSON.stringify({op:'upsert',zone,rec})})}catch(e){}
      return this.load(zone);
    }
    let acts=await this.load(zone);
    const i=acts.findIndex(a=>a.id===rec.id);
    if(i>=0)acts[i]=rec;else acts.push(rec);
    return this._saveLocal(zone,acts);
  },
  async remove(zone,id){
    if(this.mode==='gas'){
      try{await fetch(SYNC_URL,{method:'POST',body:JSON.stringify({op:'remove',zone,id})})}catch(e){}
      return this.load(zone);
    }
    let acts=await this.load(zone);
    acts=acts.filter(a=>a.id!==id);
    return this._saveLocal(zone,acts);
  },
  async _saveLocal(zone,acts){
    const key='act:'+zone;
    const cut=Date.now()-12*3600*1000;
    acts=acts.filter(a=>(a.doneTs||a.ts)>=cut).slice(-200);
    if(this.mode==='claude'){
      try{await window.storage.set(key,JSON.stringify(acts),true)}catch(e){MEM[key]=acts}
      return acts;
    }
    try{localStorage.setItem(key,JSON.stringify(acts));if(BC)BC.postMessage(zone)}
    catch(e){MEM[key]=acts}
    return acts;
  }
};

async function upsertAct(rec){APP.acts=await Store.upsert(APP.zone,rec)}
async function removeAct(id){APP.acts=await Store.remove(APP.zone,id)}

/* 有效庫存增減:所有人「進行中(=已預約)+已完成」的搬移 + 綁/解車 */
function effAdj(acts){
  const adj={};
  for(const a of acts||[]){
    if(a.kind==='task'){for(const s of a.stops)adj[s.st]=(adj[s.st]||0)+(s.a==='pickup'?-s.q:+s.q)}
    else if(a.kind==='bind')adj[a.st]=(adj[a.st]||0)-a.q;
    else if(a.kind==='unbind')adj[a.st]=(adj[a.st]||0)+a.q;
  }
  return adj;
}
const adjSig=adj=>Object.keys(adj).sort().map(k=>k+':'+adj[k]).join(',');
/* 只取「其他人」的異動簽章 — 自己的任務進度不該觸發重算提示 */
const othersSig=acts=>adjSig(effAdj((acts||[]).filter(a=>a.emp!==APP.emp)));

function newTaskAct(item){
  const c=item.trip;
  return{id:APP.emp+'-'+Date.now()+'-'+Math.floor(Math.random()*1e4),
    emp:APP.emp,truck:APP.truck,zone:APP.zone,kind:'task',type:c.type,
    target:c.target,load:c.load,
    stops:c.stops.map(s=>({st:s.station,a:s.action,q:s.qty})),
    status:'進行中',ts:Date.now(),doneTs:null};
}

/* ═══ 同區動態面板 ═══ */
function tHM(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
const KIND_TXT={in:['補車','in'],out:['拉車','out'],bind:['綁車','bind'],unbind:['解車','unbind']};
function renderFeed(){
  const box=$('feedBox');if(!APP.zone){box.innerHTML='';return}
  const STAT_ORD={'進行中':0,'未執行':1,'已完成':2};
  const list=(APP.acts||[]).slice()
    .sort((a,b)=>(STAT_ORD[a.status]??9)-(STAT_ORD[b.status]??9)||(b.doneTs||b.ts)-(a.doneTs||a.ts))
    .slice(0,12);
  const items=list.map(a=>{
    const kk=a.kind==='task'?a.type:a.kind;
    const[kt,kc]=KIND_TXT[kk]||['?',''];
    let route='';
    if(a.kind==='task'){
      const pk=a.stops.filter(s=>s.a==='pickup').map(s=>s.st+'('+s.q+')').join('、');
      const dp=a.stops.filter(s=>s.a!=='pickup').map(s=>s.st+'('+s.q+')').join('、');
      route=`<div class="froute">調出:${pk} → 調入:${dp}</div>`;
    }else route=`<div class="froute">${a.st} ${a.q} 輛</div>`;
    const sc=a.status==='進行中'?'run':a.status==='已完成'?'done':'todo';
    const me=a.emp===APP.emp?'<span class="fme">我</span>':'';
    return`<li><div class="frow">
      <span class="fst ${sc}">${a.status}</span>
      <span class="fkind ${kc}">${kt}</span>
      <span>${a.emp}${a.truck?'/'+a.truck:''}${me}</span>
      <span class="ftime">${tHM(a.doneTs||a.ts)}</span></div>${route}</li>`;
  }).join('');
  const stale=APP.sol&&othersSig(APP.acts)!==APP.adjSig;
  box.innerHTML=`<div class="feed">
    <div class="feed-h"><span>同區動態 ${APP.zone}</span>
      <span class="note" id="feedNote">${stale?'⚠️ 有新動態,建議重算':''}</span>
      <a id="rptBtn">＋回報綁/解車</a></div>
    <div class="rpt hide" id="rptForm">
      <div class="row">
        <input class="r-st" id="rptSt" list="stationList" placeholder="場站名稱" autocomplete="off">
        <select id="rptKind"><option value="bind">綁車</option><option value="unbind">解車</option></select>
        <input class="r-q" id="rptQty" type="number" min="1" max="99" placeholder="輛">
      </div>
      <button class="r-send" id="rptSend" type="button">送出回報</button>
    </div>
    ${items?`<ul>${items}</ul>`:'<div class="fempty">目前無調度動態</div>'}
  </div>`;
  $('rptBtn').addEventListener('click',()=>$('rptForm').classList.toggle('hide'));
  $('rptSt').addEventListener('input',e=>{
    const q=e.target.value.trim();
    $('stationList').innerHTML=q?DATA.filter(d=>d.station.includes(q)).slice(0,30)
      .map(d=>`<option value="${d.station}">${d.area}·${d.district}</option>`).join(''):'';
  });
  $('rptSend').addEventListener('click',async()=>{
    const st=$('rptSt').value.trim(),k=$('rptKind').value,q=+$('rptQty').value;
    if(!st||!q||q<1)return;
    if(!DATA.find(d=>d.station===st)){$('rptSt').value='';$('rptSt').placeholder='查無此場站';return}
    await upsertAct({id:APP.emp+'-r'+Date.now(),emp:APP.emp,truck:APP.truck,zone:APP.zone,
      kind:k,st,q,status:'已完成',ts:Date.now(),doneTs:Date.now()});
    renderFeed();
  });
}

/* 每 30 秒同步一次同區動態(背景分頁暫停,節省後端額度) */
setInterval(async()=>{
  if(!APP.zone||$('scrTask').classList.contains('hide'))return;
  if(typeof document!=='undefined'&&document.hidden)return;
  APP.acts=await Store.load(APP.zone);
  renderFeed();
},30000);
if(BC)BC.onmessage=async e=>{
  if(e.data===APP.zone){APP.acts=await Store.load(APP.zone);renderFeed()}
};

function fm(m){return m.toFixed(1)}
function fD(km){return(km*1000).toFixed(0)+'m'}
function nowHour(){return new Date().getHours()}
function clockTxt(){const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}

/* ═══ 初始化表單 ═══ */
function initForm(){
  const zones=[...new Set(DATA.map(d=>d.area))].sort();
  const byCity={};
  for(const z of zones){
    const c=DATA.find(d=>d.area===z).city;
    (byCity[c]=byCity[c]||[]).push(z);
  }
  let h='<option value="">— 請選擇 —</option>';
  for(const c of Object.keys(byCity).sort()){
    h+=`<optgroup label="${c}">`+byCity[c].map(z=>{
      const n=DATA.filter(d=>d.area===z).length;
      return`<option value="${z}">${z}(${n}站)</option>`;
    }).join('')+'</optgroup>';
  }
  $('zoneSel').innerHTML=h;
  $('stationList').innerHTML=DATA.map(d=>`<option value="${d.station}">${d.area}·${d.district}</option>`).join('');
  setInterval(()=>$('clock').textContent=clockTxt(),1000);
  $('clock').textContent=clockTxt();
}

/* ═══ 定位 ═══ */
function nearestStation(lat,lng){
  let best=null,bd=1e9;
  for(const d of DATA){
    const dd=hav({lat,lng},d);
    if(dd<bd){bd=dd;best=d}
  }
  return{st:best,km:bd};
}
$('gpsBtn').addEventListener('click',()=>{
  if(!navigator.geolocation){$('locHint').textContent='此裝置不支援定位,請手動輸入場站。';return}
  $('locHint').textContent='定位中…';
  navigator.geolocation.getCurrentPosition(p=>{
    const{latitude:lat,longitude:lng}=p.coords;
    const nr=nearestStation(lat,lng);
    APP.pos={station:'目前位置(GPS)',lat,lng};
    APP.posLabel=`GPS(${nr.st.station}附近)`;
    $('locInput').value='';
    $('locHint').innerHTML=`✅ 已定位。最近場站:<b>${nr.st.station}</b>(${nr.st.area},約${fD(nr.km)})`+
      `<span class="apply" data-z="${nr.st.area}">套用此責任區</span>`;
    $('locHint').querySelector('.apply').addEventListener('click',e=>{
      $('zoneSel').value=e.target.dataset.z;
    });
  },err=>{
    $('locHint').textContent='⚠️ 定位失敗('+err.message+'),請手動輸入場站。';
  },{enableHighAccuracy:true,timeout:10000});
});
$('locInput').addEventListener('input',()=>{APP.pos=null;$('locHint').textContent=''});

/* ═══ 派發 ═══ */
$('goBtn').addEventListener('click',async()=>{
  const emp=$('empId').value.trim(),zone=$('zoneSel').value,truck=$('truckId').value.trim();
  const locTxt=$('locInput').value.trim();
  const err=$('formErr');
  if(!emp){err.textContent='請輸入員工編號';return}
  if(!zone){err.textContent='請選擇責任區';return}
  if(!truck){err.textContent='請輸入車號';return}
  let pos=APP.pos,posLabel=APP.posLabel;
  if(!pos){
    if(!locTxt){err.textContent='請輸入場站地點或按定位';return}
    const st=DATA.find(d=>d.station===locTxt)||DATA.find(d=>d.station.includes(locTxt));
    if(!st){err.textContent='查無此場站,請確認名稱';return}
    pos={station:st.station,lat:st.lat,lng:st.lng};posLabel=st.station;
  }
  err.textContent='';
  let t=nowHour();
  let note='';
  if(t<6){note='(現為非營運時段,以 6 時流量估算)';t=6}
  if(t>23)t=23;

  APP.emp=emp;APP.truck=truck;APP.zone=zone;APP.pos=pos;APP.posLabel=posLabel;APP.t=t;
  APP.acts=await Store.load(zone);
  const adj=effAdj(APP.acts);
  APP.sol=solve(zone,t,MAXQ,spdAt(t),TOR,BUDGET,pos,adj);
  APP.adjSig=othersSig(APP.acts);
  APP.idx=0;APP.cum=0;
  await claimSchedule();
  $('scrForm').classList.add('hide');
  $('scrTask').classList.remove('hide');
  renderChips(note);renderFeed();renderTask();
  window.scrollTo(0,0);
});

/* 把整份班次登記到同區動態:目前趟=進行中、之後=未執行(皆視為已預約路線) */
async function claimSchedule(){
  APP.myActs=[];
  if(!APP.sol)return;
  for(let i=0;i<APP.sol.schedule.length;i++){
    const rec=newTaskAct(APP.sol.schedule[i]);
    rec.status=(i===APP.idx)?'進行中':'未執行';
    APP.myActs[i]=rec;
    await upsertAct(rec);
  }
}
/* 釋放我尚未完成的登記(返回/重算時) */
async function releaseMine(){
  for(const rec of APP.myActs){
    if(rec&&rec.status!=='已完成')await removeAct(rec.id);
  }
  APP.myActs=[];
}

function renderChips(note){
  $('chips').innerHTML=
    `<div class="chip"><span>員編</span>${APP.emp}</div>`+
    `<div class="chip"><span>車號</span>${APP.truck}</div>`+
    `<div class="chip"><span>責任區</span>${APP.zone}</div>`+
    `<div class="chip"><span>時段</span>${APP.t}:00${note||''}</div>`+
    `<div class="chip"><span>區內</span>缺車${APP.sol.shortC}站/滿柱${APP.sol.fullC}站</div>`;
}

/* ═══ 任務渲染 ═══ */
function renderTask(){
  const sol=APP.sol,i=APP.idx,box=$('taskBox');
  $('stepline').innerHTML=sol.schedule.length?
    `任務 <b>${Math.min(i+1,sol.schedule.length)}</b> / ${sol.schedule.length} ・ 60分鐘班次規劃`:'';

  if(!sol.schedule.length){
    box.innerHTML=`<div class="empty">🎉 ${APP.zone} 目前無需調度<br>
      <span style="font-size:.78rem">本時段區內無缺車(≥${MIN_Q}輛)且無滿柱場站</span></div>`;
    $('doneBtn').classList.add('hide');$('miniInfo').innerHTML='';
    return;
  }
  if(i>=sol.schedule.length){renderFinish();return}
  $('doneBtn').classList.remove('hide');

  const item=sol.schedule[i],c=item.trip;
  const isIn=c.type==='in';
  const label=isIn?'補 車':'拉 車';
  const cls=isIn?'in':'out';
  const sub=isIn
    ?`缺車站需求 — 先至來源站取車,再送達目標站`
    :`滿柱站需清車 — 取出後分送至缺車場站`;

  /* 銜接:只提示第一個前往地點 */
  let linkHtml='';
  if(item.linkTime>0.05){
    linkHtml=`<div class="link-bar"><span class="lk-ic">🚛</span>
      <span>由 ${i===0?APP.posLabel:item.linkFrom} 前往 <b>${item.linkTo}</b></span></div>`;
  }

  /* 站點流程 */
  const sd=c.tt.sd;
  let flow='<div class="flow">';
  for(let k=0;k<sd.length;k++){
    const s=sd[k];
    const pk=s.action==='pickup';
    flow+=`<div class="stop ${pk?'pk':'dp'}">
      <div class="rail"><div class="dot">${pk?'調出':'調入'}</div>${k<sd.length-1?'<div class="vline"></div>':''}</div>
      <div class="body">
        <div class="st-name">${s.station}</div>
        <div class="st-act">${pk?'調出':'調入'} ${s.qty} 輛</div>
      </div></div>`;
  }
  flow+='</div>';

  const cum=APP.cum+item.linkTime+c.time;
  const pct=Math.min(100,cum/BUDGET*100);
  const pgc=pct<60?'':pct<85?'warn':'over';

  box.innerHTML=`<div class="task-card">
    <div class="task-head ${cls}">
      <div class="badge ${cls}">${label}</div>
      <div class="task-title">
        <div class="tgt">${isIn?'→ ':''}${c.target}${isIn?'':' →'}</div>
        <div class="sub">${sub}</div>
      </div>
      <div class="task-load"><div class="n">${c.load}</div><div class="u">輛</div></div>
    </div>
    ${linkHtml}
    ${flow}
    <div class="est-line">⏱ 本趟預計 <b>${Math.ceil(item.linkTime+c.time)}</b> 分鐘</div>
    <div class="pg-wrap">
      <div class="pg-track"><div class="pg-fill ${pgc}" style="width:${pct}%"></div></div>
      <div class="pg-txt">完成後累計 ${fm(cum)} / ${BUDGET} 分(${pct.toFixed(0)}%)</div>
    </div>
  </div>`;

  $('miniInfo').innerHTML=`本班次共 ${sol.schedule.length} 趟・預計調度 ${sol.totalVeh} 輛
    ・<a id="reSolve">依現在時間重算</a>`;
  $('reSolve').addEventListener('click',reSolve);
}

function renderFinish(){
  const sol=APP.sol;
  $('taskBox').innerHTML=`<div class="fin">
    <div class="big">✔ 班次完成</div>
    <div class="lbl">本 60 分鐘班次任務已全數執行</div>
    <div class="fin-grid">
      <div class="cg"><div class="v">${sol.totalVeh}</div><div class="l">總調度(輛)</div></div>
      <div class="cg"><div class="v">${sol.schedule.length}</div><div class="l">趟次</div></div>
      <div class="cg"><div class="v">${fm(sol.totalTime)}</div><div class="l">總耗時(分)</div></div>
    </div>
    <button class="btn done" id="nextShift" type="button" style="width:100%">🔄 依現在位置/時間派下一班</button>
  </div>`;
  $('doneBtn').classList.add('hide');
  $('miniInfo').innerHTML='';
  $('nextShift').addEventListener('click',reSolve);
}

/* 完成本任務 → 位置移到本趟終點,顯示下一任務 */
$('doneBtn').addEventListener('click',async()=>{
  const item=APP.sol.schedule[APP.idx];
  if(item){
    APP.cum+=item.linkTime+item.trip.time;
    const cur=APP.myActs[APP.idx];
    if(cur){cur.status='已完成';cur.doneTs=Date.now();await upsertAct(cur)}
    const endRec=item.trip.endRec;
    APP.pos={station:endRec.station,lat:endRec.lat,lng:endRec.lng};
    APP.posLabel=endRec.station;
  }
  APP.idx++;
  const nxt=APP.myActs[APP.idx];
  if(nxt){nxt.status='進行中';await upsertAct(nxt)}   // 下一趟:未執行 → 進行中
  renderFeed();renderTask();window.scrollTo(0,0);
});

/* 以目前位置+現在時間重新求解 */
async function reSolve(){
  let t=nowHour();if(t<6)t=6;if(t>23)t=23;
  APP.t=t;
  await releaseMine();                    // 釋放尚未完成的預約
  APP.acts=await Store.load(APP.zone);
  const adj=effAdj(APP.acts);
  APP.sol=solve(APP.zone,t,MAXQ,spdAt(t),TOR,BUDGET,APP.pos,adj);
  APP.adjSig=othersSig(APP.acts);
  APP.idx=0;APP.cum=0;
  await claimSchedule();
  renderChips('');renderFeed();renderTask();window.scrollTo(0,0);
}

$('backBtn').addEventListener('click',async()=>{
  await releaseMine();
  $('scrTask').classList.add('hide');
  $('scrForm').classList.remove('hide');
});

initForm();
</script>
</body>
</html>
